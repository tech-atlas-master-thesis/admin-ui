<p-input-group>
  <p-auto-complete
    [ngModel]="mappingStrings()"
    inputId="chips-combined"
    multiple
    fluid
    [forceSelection]="true"
    [readonly]="true"
    (onFocus)="onInputTouched()"
  ></p-auto-complete>
  <p-button icon="pi pi-plus" severity="secondary" (onClick)="popover.toggle($event)"></p-button>
</p-input-group>
<p-popover #popover>
  <div class="input-mapping__add">
    <input pInputText #mappingAddKey [pAutoFocus]="true" [formField]="addMappingForm.key" />
    ->
    @if (enumValues(); as enumValues) {
      <p-select [options]="enumValues" [(ngModel)]="addMappingForm.value().value" dataKey="name">
        <ng-template #item let-item>
          <span>
            {{ item.displayName | localised }}
            @if (item.description) {
              <span class="pi pi-info-circle" [pTooltip]="item.description | localised"></span>
            }
          </span>
        </ng-template>
        <ng-template #selectedItem let-item>
          {{ item.displayName | localised }}
        </ng-template>
      </p-select>
    } @else {
      <input pInputText [formField]="addMappingForm.value" (keydown.enter)="onMappingAdded()" />
    }
    <p-button
      icon="pi pi-plus"
      [label]="'action.add' | transloco"
      [disabled]="addMappingForm().invalid()"
      (onClick)="onMappingAdded()"
    ></p-button>
  </div>
</p-popover>
