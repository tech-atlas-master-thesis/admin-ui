<div class="pipeline-timeline">
  @for (step of pipelineStepsStore.steps(); track step.id) {
    <button
      class="pipeline-timeline__step"
      [ngClass]="step.state | stateClass: 'pipeline-timeline__step'"
      [class.pipeline-timeline__step--selected]="step.name === pipelineStepsStore.step()"
      (click)="pipelineStepsStore.selectStep(step)"
    >
      <span class="pi" [ngClass]="step.state | stateIcon"></span>
      <span class="pipeline-timeline__step__name">{{ step.displayName | localised: step.name }}</span
      ><span>{{ 'enum.state.' + step.state | transloco }}</span>
    </button>
  } @empty {
    Empty
  }
</div>
