<div class="sc-new-pipeline">
  <section>
    <h3>{{ 'pipeline.label.type' | transloco }}</h3>
    <div>
      <p-floatlabel variant="on">
        <p-select
          id="new-pipeline-type"
          class="full-width"
          [options]="typeOptions()"
          [ngModel]="pipelineForm.pipelineType()"
          (ngModelChange)="pipelineForm.pipelineType().value.set($event)"
          dataKey="name"
        >
        </p-select>
        <label for="new-pipeline-type">{{ 'pipeline.label.type' | transloco }}</label>
      </p-floatlabel>
    </div>
  </section>
  <section class="fluid-form">
    <div class="fluid-form-element">
      <label [for]="name">{{ 'label.name' | transloco }}</label>
      <input #name pInputText [formField]="pipelineForm.name" />
    </div>
    <div class="fluid-form-element fluid-form-full-width">
      <label [for]="description">{{ 'label.description' | transloco }}</label>
      <textarea #description rows="3" pTextarea [autoResize]="true" [formField]="pipelineForm.description"></textarea>
    </div>
  </section>
  <app-step-configuration
    [configForm]="pipelineConfigForm()"
    [configDefinition]="stepConfigDefinition()"
    [isLoading]="pipelineConfiguration.isLoading()"
  ></app-step-configuration>
  <footer>
    <p-button
      [label]="'label.create' | transloco"
      icon="pi pi-plus"
      [disabled]="pipelineForm().invalid() || !configFormValid() || pipelineConfiguration.isLoading()"
      (onClick)="onPipelineCreate()"
    ></p-button>
  </footer>
</div>
